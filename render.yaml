services:
  - type: web
    name: rentout-staging-v2
    runtime: python
    rootDir: property
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn property.wsgi:application
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: property.settings
      - key: DJANGO_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.13.1"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SITE_URL
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: ENABLE_CAPTCHA
        value: "true"
      - key: CAPTCHA_SECRET
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: REDIS_CACHE_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: GDPR_HASH_SALT
        sync: false
      - key: RENDER_DISK_PATH
        value: /var/data

  - type: worker
    name: rentout-staging-worker
    runtime: python
    rootDir: property
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_app worker -l info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: property.settings
      - key: DJANGO_DEBUG
        value: "false"

  - type: worker
    name: rentout-staging-beat
    runtime: python
    rootDir: property
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_app beat -l info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: property.settings
      - key: DJANGO_DEBUG
        value: "false"

        